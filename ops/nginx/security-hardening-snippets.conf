# Recommended hardening snippets for the origin Nginx layer.
# Assumes Cloudflare or another CDN/WAF is already in front of the origin.

server_tokens off;
client_max_body_size 1m;

# Block common path traversal probes before they hit the app.
location ~* (\.\./|\.\.%2f|%2e%2e) {
    return 403;
}

# Future upload override example. Keep this route-specific and do not open
# the body size globally unless the application actually exposes uploads.
location /api/upload {
    client_max_body_size 20m;
    proxy_pass http://127.0.0.1:3100;
}

# Internal endpoints should be restricted by source IP when possible.
location ~ ^/api/(queue|monitoring)/ {
    allow 127.0.0.1;
    allow <trusted-worker-ip>;
    deny all;
    proxy_pass http://127.0.0.1:3100;
}

# Optional low-confidence noisy-query reduction.
# This is NOT a primary SQL injection defense and may create false positives.
# Prefer managed WAF rules or challenge/log-only mode before returning 403.
#
