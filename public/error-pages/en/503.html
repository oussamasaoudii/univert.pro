<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>503 — Service Unavailable</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/error-pages/styles.css" />
</head>
<body>
  <div class="hero-glow"></div>
  <main role="main">
    <div class="error-container">
      <p class="error-code">503</p>
      <h1 class="error-title">Service Unavailable</h1>
      <p class="error-description">The service is temporarily unavailable. Please try again later.</p>
      <div class="error-actions">
        <a href="/" class="btn btn-primary">Return to Home</a>
        <a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>
      </div>
    </div>
  </main>
  <footer>
    <p>&copy; 2026</p>
  </footer>
</body>
</html>
